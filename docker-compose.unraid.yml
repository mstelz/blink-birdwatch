services:
  # BirdNET-Go dashboard/API container
  birdnet-go-ui:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: birdnet-go-ui
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Chicago}
      - BIRDNET_UID=${BIRDNET_UID:-99}
      - BIRDNET_GID=${BIRDNET_GID:-100}
    ports:
      - "${BIRDNET_GO_PORT:-8080}:8080"
    volumes:
      - ${BIRDNET_CONFIG_DIR:-./birdnet-go/config}:/config
      - ${BIRDNET_DATA_DIR:-./birdnet-go/data}:/data
      - ${BIRDNET_WATCH_DIR:-./output}:/blink-processed
      - ${BIRDNET_RESULT_DIR:-./birdnet-output}:/birdnet-output

  # BirdNET-Go file watcher worker (processes WAV files from bridge)
  birdnet-go-worker:
    image: ghcr.io/tphakala/birdnet-go:nightly
    container_name: birdnet-go-worker
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Chicago}
      - BIRDNET_UID=${BIRDNET_UID:-99}
      - BIRDNET_GID=${BIRDNET_GID:-100}
    command: ["birdnet-go", "directory", "/blink-processed", "--watch", "--recursive", "--output", "/birdnet-output", "--type", "csv"]
    volumes:
      - ${BIRDNET_CONFIG_DIR:-./birdnet-go/config}:/config
      - ${BIRDNET_DATA_DIR:-./birdnet-go/data}:/data
      - ${BIRDNET_WATCH_DIR:-./output}:/blink-processed
      - ${BIRDNET_RESULT_DIR:-./birdnet-output}:/birdnet-output

  # Blink motion -> WAV bridge
  blink-bridge:
    image: ghcr.io/mstelz/birdwatch:latest
    container_name: blink-bridge
    restart: unless-stopped
    ports:
      - "${BRIDGE_PORT:-8787}:${PORT:-8787}"
    env_file:
      - .env
    volumes:
      - ${BLINK_CONFIG_DIR:-./config}:/app/config
      - ${BLINK_WORK_DIR:-./work}:/app/work
      - ${BIRDNET_WATCH_DIR:-./output}:/app/output

  # Sidecar: imports BirdNET-Go CSV outputs into the SQLite DB the UI reads.
  # This keeps the UI populated even when the worker runs in `directory --type csv` mode.
  db-importer:
    image: ghcr.io/mstelz/blink-birdwatch-db-importer:${BIRDNET_IMPORTER_TAG:-v0.1.26}
    container_name: birdnet-db-importer
    restart: unless-stopped
    environment:
      - TZ=${TZ:-America/Chicago}
      - DB_PATH=/data/birdnet.db
      - CSV_DIR=/birdnet-output
      - IMPORT_TZ=${TZ:-America/Chicago}
      - INTERVAL_SEC=${IMPORT_INTERVAL_SEC:-10}
    volumes:
      - ${BIRDNET_DATA_DIR:-./birdnet-go/data}:/data
      - ${BIRDNET_RESULT_DIR:-./birdnet-output}:/birdnet-output

  # BlinkBridge (RTSP) add-on (optional)
  # - Provides RTSP streams via MediaMTX from Blink motion clips.
  # - Useful for adding RTSP sources directly inside BirdNET-Go UI.
  #
  # Setup:
  # 1) Create config.json in BLINKBRIDGE_CONFIG_DIR (see: https://github.com/roger-/blinkbridge)
  # 2) Run once to enter Blink verification code (creates .cred.json), then `up -d`.
  mediamtx:
    image: bluenviron/mediamtx
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "${MEDIA_MTX_RTSP_PORT:-8554}:8554"

  blinkbridge:
    image: rogerdammit/blinkbridge
    container_name: blinkbridge
    restart: unless-stopped
    tty: true
    environment:
      - BLINKBRIDGE_CONFIG=/config/config.json
    volumes:
      - ${BLINKBRIDGE_CONFIG_DIR:-/mnt/user/appdata/blinkbridge/config}:/config
      - ${BLINKBRIDGE_WORKING_DIR:-/mnt/user/appdata/blinkbridge/working}:/working
