name: Build and Push Images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional image tag for manual publish (example: v0.1.26 or 0.1.26)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMPORTER_IMAGE_NAME: ${{ github.repository }}-db-importer
  RTSP_IMAGE_NAME: ${{ github.repository }}-rtsp-publisher

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Main bridge image
      - name: Extract metadata (bridge)
        id: meta_bridge
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest

      - name: Build and push (bridge)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta_bridge.outputs.tags }}
          labels: ${{ steps.meta_bridge.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Importer sidecar image
      - name: Extract metadata (importer)
        id: meta_importer
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMPORTER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push (importer)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.importer
          push: true
          tags: ${{ steps.meta_importer.outputs.tags }}
          labels: ${{ steps.meta_importer.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # RTSP publisher image
      - name: Extract metadata (rtsp-publisher)
        id: meta_rtsp
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.RTSP_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build and push (rtsp-publisher)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.rtsp-publisher
          push: true
          tags: ${{ steps.meta_rtsp.outputs.tags }}
          labels: ${{ steps.meta_rtsp.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
